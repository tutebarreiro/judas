<style>
:root {
  --bg: #0a0a0a;
  --card: #141414;
  --gold: #d4af37;
  --text: #f5f5f5;
}

* { box-sizing: border-box; }

* { 
  touch-action: manipulation;
}

button {
  touch-action: manipulation;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Google Sans Flex, sans-serif;
}

/* CONTENEDOR */
#app {
  max-width: 420px;
  margin: auto;
  padding: 20px 16px;
}

/* TITULOS */
h1 {
  text-align: center;
  color: var(--gold);
  font-size: 30px;
}

h2 {
  font-size: 22px;
}

/* CARD */
.card {
  background: var(--card);
  border-radius: 18px;
  padding: 20px;
  margin-top: 16px;
  box-shadow: 0 0 20px rgba(212,175,55,0.1);
}

.stepper {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #1e1e1e;
  border-radius: 14px;
  padding: 0 16px;   /* Un poco más de aire a los lados */
  height: 70px;      /* Reducido ligeramente para mejor estética */
  margin: 10px 0;
  overflow: hidden;  /* Evita que nada sobresalga */
}

.stepper button {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  
  /* Flexbox para centrar el icono dentro del botón */
  display: flex;
  align-items: center;
  justify-content: center;
  
  padding: 0;
  margin: 0;         /* Quitamos márgenes heredados de otros botones */
  line-height: normal;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  transition: all 0.15s ease;
  cursor: pointer;
}

.stepper button:hover {
  background: rgba(255,255,255,0.1);
}

.stepper button:active {
  transform: scale(0.92);
  background: rgba(255,255,255,0.15);
}

.stepper button img {
  width:18px;
  opacity:0.8;
  display:block;        /* 🔥 clave */
  margin:auto;          /* 🔥 centra perfecto */
}

.stepper span {
  font-size: 40px;    /* Bajado de 50px a 40px para que no choque con los bordes */
  font-weight: bold;
  color: var(--gold);
  line-height: 70px;  /* Misma altura que el contenedor .stepper para centrar verticalmente */
  display: inline-block;
}
  
/* INPUT */
input {
  width: 100%;
  /* height: 44px;        /* 👈 controla la altura */
  padding: 0 14px;     /* 👈 elimina altura extra */
  margin: 6px 0;       /* 👈 opcional: menos separación */
  border-radius: 10px;
  border: none;
  background: #1e1e1e;
  color: white;
  font-size: 15px;
}

/* BOTÓN */
button {
  width: 100%;
  padding: 16px;
  margin-top: 14px;
  border-radius: 12px;
  border: none;
  background: var(--gold);
  color: black;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

/* LISTAS */
.player {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #1e1e1e;
  padding: 14px;
  border-radius: 10px;
  margin: 6px 0;
}

.player input {
  width: 18px;
  height: 18px;
}

/* TEXTO */
.big-text {
  font-size: 24px;
  font-weight: bold;
  text-align: center;
}

.category {
  text-align: center;
  font-size: 18px;
  color: var(--gold);
}

/* SPLASH */
.splash {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;

  transform: translateY(-5%);
}

.logo {
  width: 140px;
  height: 140px;
  border-radius: 28px;
  background: #1e1e1e;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.end-player {
  position: relative;
  overflow: hidden;
}

/* línea de tachado */
.end-player::after {
  content: "";
  position: absolute;
  left: 10px;
  right: 10px;
  top: 50%;
  height: 2px;
  background: #ff3b30;

  transform: scaleX(0);
  transform-origin: left;

  transition: transform 0.5s ease;
}

/* jugador eliminado */
.end-player.dead {
  opacity: 0.5;
}

/* animación */
.end-player.dead::after {
  transform: scaleX(1);
}

/* ANIMACIÓN */
.logo-stamp {
  display:flex;
  align-items:center;
  justify-content:center;
}

/* LOGO */
.logo-img {
  width: 250px;
  height: auto;

  animation: stamp 0.6s ease-out forwards;

  filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6));
}

.logo-final img {
  width: 150px;
  margin-bottom: 10px;

  filter: drop-shadow(0 0 15px rgba(212,175,55,0.6));
  animation: pulseSmooth 3.5s ease-in-out infinite;
}
  
/* ANIMACIÓN SELLO */
@keyframes stamp {
  0% {
    transform: scale(2.5) rotate(-8deg);
    opacity: 0;
  }

  60% {
    transform: scale(0.9) rotate(2deg);
    opacity: 1;
  }

  100% {
    transform: scale(1) rotate(0deg);
  }
}
 
.fade {
  animation: fade 0.3s ease;
}

@keyframes winPop {
  0% {
    opacity:0;
    transform:scale(0.6);
  }
  60% {
    opacity:1;
    transform:scale(1.15);
  }
  100% {
    transform:scale(1);
  }
}

@keyframes goldGlow {
  0% { text-shadow: 0 0 0 rgba(212,175,55,0); }
  50% { text-shadow: 0 0 25px rgba(212,175,55,0.9); }
  100% { text-shadow: 0 0 0 rgba(212,175,55,0); }
}

@keyframes redGlow {
  0% { text-shadow: 0 0 0 rgba(255,0,0,0); }
  50% { text-shadow: 0 0 25px rgba(255,0,0,0.9); }
  100% { text-shadow: 0 0 0 rgba(255,0,0,0); }
}
  
@keyframes fade {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes zoomFade {
  from {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.7);
  }
  to {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
}

@keyframes alertPop {
  0% {
    opacity: 0;
    transform: scale(0.6);
  }
  60% {
    opacity: 1;
    transform: scale(1.1);
  }
  100% {
    transform: scale(1);
  }
}

@keyframes pulseGlow {
  0% {
    transform: scale(1);
    text-shadow: 0 0 0 rgba(212,175,55,0);
  }
  50% {
    transform: scale(1.15);
    text-shadow: 0 0 20px rgba(212,175,55,0.8);
  }
  100% {
    transform: scale(1);
    text-shadow: 0 0 0 rgba(212,175,55,0);
  }
}

@keyframes pulseSmooth {
  0% {
    transform: scale(1);
    filter: drop-shadow(0 0 10px rgba(212,175,55,0.4));
  }
  50% {
    transform: scale(1.06);
    filter: drop-shadow(0 0 25px rgba(212,175,55,0.9));
  }
  100% {
    transform: scale(1);
    filter: drop-shadow(0 0 10px rgba(212,175,55,0.4));
  }
}

/* FILA */
.switch-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 14px;
  gap: 12px; /* 🔥 evita que se peguen */
}

/* SWITCH BASE */
.switch {
  position: relative;
  width: 52px;
  height: 30px;

  flex-shrink: 0;   /* 🔥 CLAVE: evita que se achique */
}

.switch input {
  appearance: none;
}

/* OCULTAR INPUT */
.switch input {
  opacity:0;
  width:0;
  height:0;
}

/* FONDO */
.slider {
  position: absolute;
  inset: 0;
  background: #2c2c2e;
  border-radius: 999px;
  transition: 0.25s ease;
}

.slider::before {
  content: "";
  position: absolute;
  height: 22px;
  width: 22px;
  left: 4px;
  top: 4px;
  background: white;
  border-radius: 50%;
  transition: 0.25s ease;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
}

/* HOVER (desktop) */
.switch:hover .slider::before {
  transform:scale(1.1);
}

/* ACTIVO */
.switch input:checked + .slider {
  background: #34c759;
}

.switch input:checked + .slider::before {
  transform: translateX(22px);
}


/* CLICK (efecto presión) */
.switch input:active + .slider::before {
  transform: scale(0.95);
}

.switch input:checked + .slider::before {
  transform: translateX(22px) scale(1.05);
}

/* LISTA TIPO WHATSAPP / IOS */
.wa-player{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1e1e1e;
  padding:14px 16px;
  border-radius:14px;
  margin:8px 0;
  cursor:pointer;
  transition:0.2s ease;
}

.wa-player:active{
  transform:scale(0.98);
}

/* SWITCH BASE */
.wa-switch{
  width:44px;
  height:26px;
  background:#3a3a3c;
  border-radius:999px;
  position:relative;
  transition:0.25s ease;
}

/* BOLA */
.wa-knob{
  width:20px;
  height:20px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:3px;
  left:3px;
  transition:0.25s ease;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* ESTADO ACTIVO */
.wa-player.selected .wa-switch{
  background:#34c759;
}

.wa-player.selected .wa-knob{
  transform:translateX(18px);
}

/* PANTALLA FINAL */
.end-screen {
  position: fixed;
  inset: 0;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* FONDO DINÁMICO */
.end-screen.win {
  background: radial-gradient(circle at center, #1a2a1a, #000);
}

.end-screen.lose {
  background: radial-gradient(circle at center, #2a0000, #000);
}

/* CARD */
.end-card {
  position: relative;
  z-index: 2;
  background: rgba(20,20,20,0.9);
  backdrop-filter: blur(10px);
  border-radius: 22px;
  padding: 30px 25px;
  text-align:center;
  width:90%;
  max-width:360px;
  animation: winPop 0.5s ease;
}

/* ICONO */
.end-card .icon img {
  width:80px;
  margin-bottom:15px;
}

/* TITULO */
.title {
  font-size:26px;
  margin:10px 0;
}

/* SUB */
.subtitle {
  opacity:0.7;
  margin-bottom:20px;
}

/* GLOW */
.end-screen.win .title {
  color: var(--gold);
  animation: goldGlow 1.2s infinite;
}

.end-screen.lose .title {
  color:#ff3b30;
  animation: redGlow 1.2s infinite;
}

/* CONFETTI */
.confetti::before,
.confetti::after {
  content:"";
  position:absolute;
  inset:0; /* 🔥 ocupa exacto toda la pantalla */

  background-image:
    radial-gradient(circle at 50% 50%, #ff0 2px, transparent 2px),
    radial-gradient(circle at 50% 50%, #0ff 2px, transparent 2px),
    radial-gradient(circle at 50% 50%, #f0f 2px, transparent 2px),
    radial-gradient(circle at 50% 50%, #0f0 2px, transparent 2px);

  background-size: 60px 60px;
  background-position:
    0 0,
    30px 30px,
    15px 15px,
    45px 45px;

  animation: confettiFall 6s linear infinite;
  opacity:0.35;
}

.confetti::after {
  animation-delay: -3s;
}

/* ANIMACIÓN CONFETTI */
@keyframes confettiFall {
  from {
    transform: translateY(-20%);
  }
  to {
    transform: translateY(20%);
  }
}
  
</style>
</head>

// ---------- RECOMENDACIÓN ----------
function updateReco() {
  const n = +document.getElementById("players").value;
  const reco = document.getElementById("reco");

  if (!n || n < 3) {
    reco.textContent = "Ingresa al menos 3 jugadores";
    return;
  }

  let imp = n <= 6 ? 1 : n <= 9 ? 2 : 3;

  reco.textContent = `Recomendado para ${n} jugadores: ${imp} impostor${imp > 1 ? "es" : ""}`;
}

let autoImpostors = true;

function changePlayers(delta) {
  let el = document.getElementById("players");
  let value = parseInt(el.textContent);

  value += delta;

  if (value < 3) value = 3;
  if (value > 20) value = 20;

  el.textContent = value;

  if (autoImpostors) {
    let imp = value <= 5 ? 1 : value <= 9 ? 2 : 3;
    document.getElementById("impostors").textContent = imp;
  }
}

function changeImpostors(delta) {
  let el = document.getElementById("impostors");
  let players = parseInt(document.getElementById("players").textContent);
  let value = parseInt(el.textContent);

  value += delta;

  if (value < 1) value = 1;
  if (value >= players) value = players - 1;

  el.textContent = value;

  autoImpostors = false;
}

// ---------- NOMBRES ----------
function names() {
  const n = +document.getElementById("players").textContent;
  const imp = +document.getElementById("impostors").textContent;

  gameState.enableZacarias = document.getElementById("enableZacarias").checked;
  gameState.enableGuardian = document.getElementById("enableGuardian").checked;
  
  if (!n || n < 3) return alert("Ingresa al menos 3 jugadores");
  if (!imp || imp < 1) return alert("Debe haber al menos 1 impostor");
  if (imp >= n) return alert("Debe haber menos impostores que jugadores");

  if (gameState.enableDuo && n < 6) {
    return alert("Ananías y Safira requiere al menos 6 jugadores");
  }

  gameState.numImpostors = imp;

  let html = `

// ---------- START ----------
function startGame(n) {
  let jugadores = [];

  for (let i = 0; i < n; i++) {
    let nombre = document.getElementById(`p${i}`).value.trim();
    if (!nombre) return alert("Completa todos los nombres");
    jugadores.push({
      nombre,
      rol:"inocente",     // equipo
      especial:null,      // rol especial
      activo:true
    });
  }

  const categorias = Object.keys(db);
  const categoria = categorias[Math.floor(Math.random()*categorias.length)];
  const palabra = db[categoria][Math.floor(Math.random()*db[categoria].length)];

  let impostores = [];
  let numImp = gameState.numImpostors || 1;

  while (impostores.length < numImp) {
    let r = Math.floor(Math.random()*n);
    if (!impostores.includes(r)) {
      jugadores[r].rol = "impostor";
      impostores.push(r);
    }
  }

  gameState = {
    ...gameState,
    jugadores,
    palabra,
    categoria,
    ronda:1,
    indexReveal:0
  };

  gameState.votes = [];
  gameState.voterIndex = 0;

  reveal();
}

  else if (j.especial === "juez") {
    content += `
      <p style="margin-top:15px;">

      </p>
    `;
  }

  else {
    content = `
      <div style="letter-spacing:2px; opacity:0.7;">LA PALABRA ES</div>

      <div class="big-text" style="color:var(--gold); margin:10px 0;">
        ${gameState.palabra}
      </div>

      <div style="opacity:0.7;">Categoría</div>
      <div>${gameState.categoria}</div>
    `;
  }

  // 👇 Banner arriba
  if (topBanner && !document.getElementById("impostorBanner")) {
    box.insertAdjacentHTML("beforebegin", topBanner);
  }

  // 👇 Contenido carta
  box.innerHTML = content;

  box.style.border = j.rol === "impostor"
    ? "2px solid #8b0000"
    : "2px solid var(--gold)";

  box.style.cursor = "default";
  box.onclick = null;

  // 👇 Todo lo de abajo (FIX botón + companions)
  box.insertAdjacentHTML("afterend", `
    ${companions}
    ${warning}

    <button onclick="nextReveal()" style="margin-top:20px;">

    </button>
  `);
}

function nextReveal() {
  gameState.indexReveal++;
  
  if (gameState.indexReveal >= gameState.jugadores.length) {
    if (gameState.enableJuez) {
      return pickJuez();
    }
    if (gameState.enableAbel) {
      return pickAbel();
    }
    if (gameState.enableGuardian) {
      return pickGuardian();
    }
    return startRound();
  }
  
  reveal();
}

function toggleRoles() {
  const container = document.getElementById("rolesContainer");
  const arrow = document.getElementById("rolesArrow");

  const isOpen = container.style.display === "block";

  container.style.display = isOpen ? "none" : "block";

  arrow.style.transform = isOpen
    ? "rotate(0deg)"
    : "rotate(180deg)";
}

function afterJudge() {
  if (gameState.enableAbel) {
    return pickAbel();
  }
  if (gameState.enableGuardian) {
    return pickGuardian();
  }
  startRound();
}

function pickAbel() {

  elegido.especial = "abel";
  gameState.abel = elegido;

  render(`
    ${header()}

    <div class="card" style="text-align:center;">

function showAbel() {

}

function afterAbel() {

    return pickGuardian();
  }
  startRound();
}

function pickGuardian() {
  let candidatos = gameState.jugadores
    .filter(j => j.activo && !j.especial);

  let elegido = candidatos[Math.floor(Math.random() * candidatos.length)];

  elegido.especial = "guardian";
  gameState.guardian = elegido;
  gameState.guardianUsed = false;

  render(`
    ${header()}

    <div class="card" style="text-align:center;">

}

function showGuardian() {

  render(`
    ${header()}

    <div class="card" style="text-align:center;">

}
  
function showJuez() {
  let d = gameState.juez;

  render(`
    ${header()}

    <div class="card" style="text-align:center;">
      <h2 style="color:var(--gold);">Juez</h2>

      <div style="font-size:52px; margin:20px 0;">
        ${d.nombre}
      </div>

      </p>

      <button onclick="afterJudge()">
        Continuar
      </button>
    </div>
  `);
}

function pickJuez() {
  let candidatos = gameState.jugadores
    .filter(j => j.activo); // solo vivos

  let elegido = candidatos[Math.floor(Math.random() * candidatos.length)];

  elegido.especial = "juez";

  gameState.juez = elegido;

    ${header()}

// ---------- RONDA ----------
function startRound() {

  // Barajamos el orden para que cada ronda sea distinta
  let ordenTurno = [...activos].sort(() => Math.random() - 0.5);

  let zacarias = null;

  if (gameState.enableZacarias) {
    zacarias = ordenTurno[Math.floor(Math.random() * ordenTurno.length)];
    gameState.zacariasActual = zacarias.nombre;
  }

  render(`
    <div style="text-align:center; margin-bottom:20px;">
      <span style="background:#1e1e1e; padding:6px 16px; border-radius:20px; color:var(--gold); font-size:14px; font-weight:bold;">
        Ronda ${gameState.ronda}
      </span>
    </div>

    <div style="text-align:center; margin-bottom:24px;">
       <img src="iconos/random.png" style="width:50px;">
       <h1 style="margin:10px 0 5px 0; color:white; font-size:28px;">Orden de participación</h1>
       <p style="opacity:0.5; font-size:14px; margin:0; padding: 0 40px; line-height:1.4;">
         Los jugadores dirán una palabra relacionada en este orden
       </p>
    </div>

    <div class="card" style="padding:8px; background:#111; border: 1px solid #1a1a1a;">
      ${ordenTurno.map((j, idx) => `
        <div style="display:flex; align-items:center; gap:15px; padding:14px 12px; ${idx !== ordenTurno.length - 1 ? 'border-bottom:1px solid #1a1a1a;' : ''}">

          <div style="width:34px; height:34px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; font-size:16px; flex-shrink:0;">
            ${idx + 1}
          </div>

          <img src="iconos/jugador.png" style="width:30px; opacity:0.8;">

          <span style="font-size:19px; font-weight:500; color:#eee;">
            ${j.nombre}
          </span>

          ${
            gameState.enableZacarias && gameState.zacariasActual === j.nombre
              ? `<img src="iconos/zacarias.png" style="width:34px; margin-left:auto;">`
              : ""
          }

        </div>
      `).join("")}
    </div>

    <div class="card" style="background:#141414; border:none; box-shadow:none; padding: 15px 15px 15px 15px;">
      <div style="display:flex; gap:12px; margin-bottom:16px; align-items:flex-start;">
        <div style="color:var(--gold); border:1px solid var(--gold); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; margin-top:2px;">✓</div>
        <p style="margin:0; font-size:14px; opacity:0.7;">Cada jugador dice una palabra relacionada con el tema</p>
      </div>
      <div style="display:flex; gap:12px; margin-bottom:16px; align-items:flex-start;">
        <div style="color:#ffcc00; border:1px solid #ffcc00; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; margin-top:2px;">!</div>
        <p style="margin:0; font-size:14px; opacity:0.7;">Los impostores no saben la palabra exacta</p>
      </div>
      <div style="display:flex; gap:12px; align-items:flex-start;">
        <div style="color:var(--gold); border:1px solid var(--gold); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; margin-top:2px;">✓</div>
        <p style="margin:0; font-size:14px; opacity:0.7;">Al final, votan para eliminar a un sospechoso</p>
      </div>
    </div>

    <button onclick="vote()" style="margin-top:10px; border-radius:18px; padding:22px; font-size:18px;">
      Ir a votación →
    </button>
  `);
}
// ---------- VOTACIÓN ----------
function getVoteCount() {
  const activos = gameState.jugadores.filter(j => j.activo);
  const impostores = activos.filter(j => j.rol === "impostor").length;

  // jugadores que puedo votar (no me incluyo)
  const votables = activos.length - 1;

  return Math.min(impostores || 1, votables);
}

function vote() {
  let activos = gameState.jugadores.filter(j => 
    j.activo || j.especial === "abel"
  );
  let voter = activos[gameState.voterIndex];

  const N = getVoteCount();
  let selected = [];

  render(`
    ${header()}

    <div class="card">
      <h2>Votación</h2>

      <p style="text-align:center; opacity:0.7;">
        Turno de <b>${voter.nombre}</b>
      </p>

      <p style="text-align:center; font-size:14px;">
        Selecciona ${N} jugador${N > 1 ? "es" : ""}
      </p>

      ${activos.map(j => 
        (j.nombre !== voter.nombre && j.activo) ? `
        <div class="wa-player" onclick="toggleVote('${j.nombre}', this)">
          <span>${j.nombre}</span>

          <div class="wa-switch">
            <div class="wa-knob"></div>
          </div>
        </div>
      ` : "").join("")}

      <button onclick="confirmVote()">
        Confirmar voto
      </button>
    </div>
  `);

  gameState.tempSelected = [];
}

function resolveVote() {
  let conteo = {};

  gameState.votes.forEach(v => {
    conteo[v] = (conteo[v] || 0) + 1;
  });

  // guardamos conteo para mostrarlo
  gameState.lastVoteCount = conteo;

  // pasamos a pantalla de resultados (SIN eliminar aún)
  showVoteResults();
}

function showVoteResults() {
  let conteo = gameState.lastVoteCount || {};

  let lista = Object.entries(conteo)
    .sort((a,b) => b[1] - a[1]);

  render(`
    ${header()}

    <div class="card">
      <h2>Resultado de votación</h2>

      ${lista.map(([nombre, votos]) => `
        <div class="player" style="justify-content:space-between;">
          <span>${nombre}</span>
          <b>${votos} voto${votos !== 1 ? "s" : ""}</b>
        </div>
      `).join("")}

      <button onclick="selectElimination()">
        Seleccionar eliminados
      </button>
    </div>
  `);
}

function selectElimination() {
  let activos = gameState.jugadores.filter(j => j.activo);
  let N = gameState.jugadores.filter(j => j.activo && j.rol === "impostor").length || 1;

  gameState.toEliminate = [];

  render(`
    ${header()}

    <div class="card">
      <h2>Selecciona ${N} jugador${N > 1 ? "es" : ""} a eliminar</h2>

      ${activos.map(j => `
        <div class="wa-player" onclick="toggleEliminate('${j.nombre}', this)">
          <span>${j.nombre}</span>

          <div class="wa-switch">
            <div class="wa-knob"></div>
          </div>
        </div>
      `).join("")}

      <button onclick="confirmElimination()">
        Confirmar eliminación
      </button>
    </div>
  `);
}

function toggleEliminate(name, el) {
  let N = gameState.jugadores.filter(j => j.activo && j.rol === "impostor").length || 1;

  let index = gameState.toEliminate.indexOf(name);

  if (index >= 0) {
    gameState.toEliminate.splice(index, 1);
    el.classList.remove("selected");
  } else {
    if (gameState.toEliminate.length >= N) return;
    gameState.toEliminate.push(name);
    el.classList.add("selected");
  }
}

function confirmElimination() {
  let eliminados = gameState.toEliminate;

  if (!eliminados || eliminados.length === 0) {
    return alert("Selecciona jugadores");
  }

  // Verificar si Ángel Guardián puede salvar
  if (gameState.enableGuardian && !gameState.guardianUsed && gameState.guardian.activo) {
    return showGuardianSave(eliminados);
  }

  // eliminar jugadores
  eliminados.forEach(nombre => {
    let j = gameState.jugadores.find(x => x.nombre === nombre);
    if (j) j.activo = false;
  });

  // mostrar resultado con roles
  showEliminationResults(eliminados);
}

function showGuardianSave(eliminados) {
  render(`
    <h1>Ángel Guardián</h1>

    <div class="card">
      <h2>¿Quieres salvar a alguien?</h2>

      <p style="opacity:0.7; margin-bottom:20px;">
        El Ángel Guardián puede salvar a uno de los eliminados esta ronda.
      </p>

      <div style="margin-bottom:20px;">
        ${eliminados.map(nombre => `
          <div class="wa-player" onclick="selectToSave('${nombre}', this)">
            <span>${nombre}</span>
            <div class="wa-switch">
              <div class="wa-knob"></div>
            </div>
          </div>
        `).join("")}
      </div>

      <div style="display:flex; gap:12px; justify-content:center;">
        <button onclick="confirmGuardianSave(null)" style="flex:1;">No salvar</button>
        <button id="saveBtn" onclick="confirmGuardianSave(gameState.selectedToSave)" disabled style="flex:1;">Salvar seleccionado</button>
      </div>
    </div>
  `);
}

function selectToSave(name, el) {
  // Si ya está seleccionado, deseleccionar
  if (el.classList.contains('selected')) {
    el.classList.remove('selected');
    gameState.selectedToSave = null;
    document.getElementById('saveBtn').disabled = true;
    return;
  }
  
  // Remover selección previa
  document.querySelectorAll('.wa-player').forEach(p => p.classList.remove('selected'));
  
  // Seleccionar este
  el.classList.add('selected');
  gameState.selectedToSave = name;
  
  // Habilitar botón
  document.getElementById('saveBtn').disabled = false;
}

function confirmGuardianSave(savedName) {
  let eliminados = gameState.toEliminate;
  
  if (savedName) {
    // Remover el salvado de eliminados
    eliminados = eliminados.filter(n => n !== savedName);
    gameState.guardianUsed = true;
  }

  // eliminar jugadores restantes
  eliminados.forEach(nombre => {
    let j = gameState.jugadores.find(x => x.nombre === nombre);
    if (j) j.activo = false;
  });

  // mostrar resultado con roles
  showEliminationResults(eliminados, savedName);
}

function showEliminationResults(eliminados, saved = null) {
  render(`
    <h1>Resultados</h1>

    <div class="card">
      <h2>Jugadores eliminados</h2>

      ${eliminados.map(nombre => {
        let j = gameState.jugadores.find(x => x.nombre === nombre);

        return `
          <div class="player" style="
            justify-content:space-between;
            background:${j.rol === "impostor" ? "#2a0000" : "#1a1a1a"};
          ">
            <span>${nombre}</span>
            <b>${j.rol.toUpperCase()}</b>
          </div>
        `;
      }).join("")}

      ${saved ? `
        <h2>Jugador salvado</h2>
        <div class="player" style="background:#1a2a1a;">
          <span>${saved}</span>
          <b>SALVADO</b>
        </div>
      ` : ""}

      <button onclick="endElimination()">
        Continuar
      </button>
    </div>
  `);
}

function endElimination() {
  let activos = gameState.jugadores.filter(j => j.activo);
  let impostoresRestantes = activos.filter(j => j.rol === "impostor").length;
  let normalesRestantes = activos.filter(j => j.rol !== "impostor").length;

  // ✅ CONDICIONES REALES DE FIN
  if (impostoresRestantes === 0) {
    return showEndScreen("inocentes");
  }

  if (impostoresRestantes >= normalesRestantes) {
    return showEndScreen("impostores");
  }

  // 🔴 SOLO SI NO TERMINÓ → mostrar alerta
  render(`
    ${header()}

    <div class="card" style="
      text-align:center;
      animation: alertPop 0.4s ease;
    ">
      <h2 style="letter-spacing:2px; opacity:0.7;">
        ⚠️ ALERTA
      </h2>

      <div style="
        font-size:60px;
        margin:25px 0;
        color:#ff3b30;
        font-weight:bold;
        animation: pulseGlow 1s ease;
      ">
        ${impostoresRestantes}
      </div>

      <p style="opacity:0.8;">
        impostor${impostoresRestantes !== 1 ? "es" : ""} siguen en juego
      </p>

      <button onclick="continueGame()" style="margin-top:25px;">
        Continuar →
      </button>
    </div>
  `);
}

function continueGame() {
  gameState.votes = [];
  gameState.voterIndex = 0;
  gameState.lastVoteCount = null;
  gameState.toEliminate = [];

  checkWin();
}

function eliminatePlayers() {
  let conteo = gameState.lastVoteCount || {};

  let ordenados = Object.entries(conteo)
    .sort((a,b) => b[1] - a[1])
    .map(x => x[0]);

  let N = gameState.jugadores.filter(j => j.activo && j.rol === "impostor").length || 1;

  let eliminados = ordenados.slice(0, N);

  eliminados.forEach(nombre => {
    let j = gameState.jugadores.find(x => x.nombre === nombre);
    if (j) j.activo = false;
  });

  gameState.votes = [];
  gameState.voterIndex = 0;
  gameState.lastVoteCount = null;

  checkWin();
}

function toggleVote(name, el) {
  let N = gameState.jugadores.filter(j => j.activo && j.rol === "impostor").length || 1;

  let index = gameState.tempSelected.indexOf(name);

  if (index >= 0) {
    gameState.tempSelected.splice(index, 1);
    el.classList.remove("selected");
  } else {
    if (gameState.tempSelected.length >= N) return;
    gameState.tempSelected.push(name);
    el.classList.add("selected");
  }
}

function confirmVote() {
  let activos = gameState.jugadores.filter(j => j.activo);
  let voter = activos[gameState.voterIndex];

  const N = getVoteCount();

  if (gameState.tempSelected.length !== N) {
    const N = getVoteCount();
    return alert(`Debes seleccionar ${N} jugadores`);
  }

  gameState.tempSelected.forEach(name => {
    gameState.votes.push(name);
  });

  gameState.voterIndex++;

  if (gameState.voterIndex >= activos.length) {
    return resolveVote();
  }

  vote();
}

// ---------- FIN ----------
function checkWin() {
  let activos = gameState.jugadores.filter(j=>j.activo);
  let impostores = activos.filter(j=>j.rol==="impostor");
  let normales = activos.filter(j=>j.rol!=="impostor");

  // 🟡 GANAN INOCENTES
  if (impostores.length === 0) {
    return showEndScreen("inocentes");
  }

  // 🔴 GANAN IMPOSTORES
  if (impostores.length >= normales.length) {
    return showEndScreen("impostores");
  }

  nextRound();
}

function showEndScreen(winner) {
  document.getElementById("app").style.padding = "0";

  const isInnocents = winner === "inocentes";

  const impostores = gameState.jugadores
    .filter(j => j.rol === "impostor")
    .map(j => j.nombre);

  const listaJugadores = gameState.jugadores;

  render(`
    <div class="end-screen ${isInnocents ? "win" : "lose"}">

      <!-- CONFETTI -->
      <div class="confetti"></div>

      <!-- CONTENIDO -->
      <div class="end-card">
      
        <div class="logo-final">
          <img src="iconos/logo.png">
        </div>

        <div class="icon">
          <img src="iconos/${isInnocents ? "jugadores-dorado.png" : "impostor.png"}">
        </div>

        <h1 class="title">
          ${isInnocents ? "¡GANAN LOS INOCENTES!" : "¡GANAN LOS IMPOSTORES!"}
        </h1>

        <p class="subtitle">
          ${isInnocents ? "La verdad salió a la luz" : "El engaño triunfó"}
        </p>

        <div style="
          margin-top:16px;
          text-align:left;
          max-height:280px;
          overflow-y:auto;
          padding-right:8px;
        ">

          <div style="
            font-size:12px;
            opacity:0.6;
            margin-bottom:8px;
            text-align:center;
          ">
            ROLES
          </div>

          ${listaJugadores.map((j, i) => `
            <div class="end-player ${j.activo ? "" : "dead"}" style="
              display:flex;
              justify-content:space-between;
              align-items:center;
              padding:10px 12px;
              border-radius:10px;
              margin-bottom:6px;
              background:rgba(255,255,255,0.04);
              font-size:14px;

              opacity:0;
              animation: fade 0.5s ease forwards;
              animation-delay:${i * 0.15}s;
            ">

              <span>${j.nombre}</span>

              <span style="
                font-weight:bold;
                color:
                  ${j.rol === "impostor" ? "#ff3b30" :
                    j.rol === "juez" ? "#4cd964" :
                    "var(--gold)"};
              ">
                ${j.rol.toUpperCase()}
                ${j.especial ? " • " + j.especial.toUpperCase() : ""}
              </span>

            </div>
          `).join("")}

        </div>

        <div style="
          margin-top:14px;
          padding:10px;
          border-radius:12px;
          background:rgba(0,0,0,0.25);
          border:1px solid rgba(255,255,255,0.08);
        ">

          <div style="font-size:12px; opacity:0.6; margin-bottom:4px;">
            IMPOSTOR${impostores.length > 1 ? "ES" : ""}
          </div>

          <div style="
            font-size:16px;
            font-weight:bold;
            letter-spacing:1px;
            color:${isInnocents ? "#ff6b6b" : "var(--gold)"};
          ">
            ${impostores.join(" • ")}
          </div>

        </div>

        <button onclick="resetLayoutAndMenu()">
          Volver al inicio
        </button>

      </div>
    </div>
  `);
}
  
function resetLayoutAndMenu() {
  document.getElementById("app").style.padding = "20px 16px";
  menu();
}
  
function nextRound() {
  gameState.ronda++;
  startRound();
}

// INIT
splash();
</script>

</body>
</html>
