<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judas</title>

<style>
:root {
  --bg: #0a0a0a;
  --card: #141414;
  --gold: #d4af37;
  --text: #f5f5f5;
}

* { box-sizing: border-box; }

* { 
  touch-action: manipulation;
}

button {
  touch-action: manipulation;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Google Sans Flex, sans-serif;
}

/* CONTENEDOR */
#app {
  max-width: 420px;
  margin: auto;
  padding: 20px 16px;
}

/* TITULOS */
h1 {
  text-align: center;
  color: var(--gold);
  font-size: 30px;
}

h2 {
  font-size: 22px;
}

/* CARD */
.card {
  background: var(--card);
  border-radius: 18px;
  padding: 20px;
  margin-top: 16px;
  box-shadow: 0 0 20px rgba(212,175,55,0.1);
}

.stepper {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #1e1e1e;
  border-radius: 14px;
  padding: 0 16px;   /* Un poco más de aire a los lados */
  height: 70px;      /* Reducido ligeramente para mejor estética */
  margin: 10px 0;
  overflow: hidden;  /* Evita que nada sobresalga */
}

.stepper button {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  
  /* Flexbox para centrar el icono dentro del botón */
  display: flex;
  align-items: center;
  justify-content: center;
  
  padding: 0;
  margin: 0;         /* Quitamos márgenes heredados de otros botones */
  line-height: normal;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  transition: all 0.15s ease;
  cursor: pointer;
}

.stepper button:hover {
  background: rgba(255,255,255,0.1);
}

.stepper button:active {
  transform: scale(0.92);
  background: rgba(255,255,255,0.15);
}

.stepper button img {
  width:18px;
  opacity:0.8;
  display:block;        /* 🔥 clave */
  margin:auto;          /* 🔥 centra perfecto */
}

.stepper span {
  font-size: 40px;    /* Bajado de 50px a 40px para que no choque con los bordes */
  font-weight: bold;
  color: var(--gold);
  line-height: 70px;  /* Misma altura que el contenedor .stepper para centrar verticalmente */
  display: inline-block;
}
  
/* INPUT */
input {
  width: 100%;
  /* height: 44px;        /* 👈 controla la altura */
  padding: 0 14px;     /* 👈 elimina altura extra */
  margin: 6px 0;       /* 👈 opcional: menos separación */
  border-radius: 10px;
  border: none;
  background: #1e1e1e;
  color: white;
  font-size: 15px;
}

/* BOTÓN */
button {
  width: 100%;
  padding: 16px;
  margin-top: 14px;
  border-radius: 12px;
  border: none;
  background: var(--gold);
  color: black;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

/* LISTAS */
.player {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #1e1e1e;
  padding: 14px;
  border-radius: 10px;
  margin: 6px 0;
}

.player input {
  width: 18px;
  height: 18px;
}

/* TEXTO */
.big-text {
  font-size: 24px;
  font-weight: bold;
  text-align: center;
}

.category {
  text-align: center;
  font-size: 18px;
  color: var(--gold);
}

/* SPLASH */
.splash {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;

  transform: translateY(-5%);
}

.logo {
  width: 140px;
  height: 140px;
  border-radius: 28px;
  background: #1e1e1e;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* ANIMACIÓN */
.logo-stamp {
  display:flex;
  align-items:center;
  justify-content:center;
}

/* LOGO */
.logo-img {
  width: 250px;
  height: auto;

  animation: stamp 0.6s ease-out forwards;
}

/* ANIMACIÓN SELLO */
@keyframes stamp {
  0% {
    transform: scale(2.5) rotate(-8deg);
    opacity: 0;
  }

  60% {
    transform: scale(0.9) rotate(2deg);
    opacity: 1;
  }

  100% {
    transform: scale(1) rotate(0deg);
  }
}

.logo-img {
  width: 250px;
  height: auto;

  animation: stamp 0.6s ease-out forwards;

  filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6));
}
  
.fade {
  animation: fade 0.3s ease;
}

@keyframes fade {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes zoomFade {
  from {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.7);
  }
  to {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
}

/* FILA */
.switch-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:14px;
}

/* SWITCH BASE */
.switch {
  position:relative;
  width:52px;
  height:30px;
}

.switch input {
  appearance: none;
}

/* OCULTAR INPUT */
.switch input {
  opacity:0;
  width:0;
  height:0;
}

/* FONDO */
.slider {
  position: absolute;
  inset: 0;
  background: #2c2c2e;
  border-radius: 999px;
  transition: 0.25s ease;
}

.slider::before {
  content: "";
  position: absolute;
  height: 22px;
  width: 22px;
  left: 4px;
  top: 4px;
  background: white;
  border-radius: 50%;
  transition: 0.25s ease;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
}

/* HOVER (desktop) */
.switch:hover .slider::before {
  transform:scale(1.1);
}

/* ACTIVO */
.switch input:checked + .slider {
  background: #34c759;
}

.switch input:checked + .slider::before {
  transform: translateX(22px);
}


/* CLICK (efecto presión) */
.switch input:active + .slider::before {
  transform: scale(0.95);
}

.switch input:checked + .slider::before {
  transform: translateX(22px) scale(1.05);
}

/* LISTA TIPO WHATSAPP / IOS */
.wa-player{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1e1e1e;
  padding:14px 16px;
  border-radius:14px;
  margin:8px 0;
  cursor:pointer;
  transition:0.2s ease;
}

.wa-player:active{
  transform:scale(0.98);
}

/* SWITCH BASE */
.wa-switch{
  width:44px;
  height:26px;
  background:#3a3a3c;
  border-radius:999px;
  position:relative;
  transition:0.25s ease;
}

/* BOLA */
.wa-knob{
  width:20px;
  height:20px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:3px;
  left:3px;
  transition:0.25s ease;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* ESTADO ACTIVO */
.wa-player.selected .wa-switch{
  background:#34c759;
}

.wa-player.selected .wa-knob{
  transform:translateX(18px);
}

</style>
</head>

<body>

<link rel="preload" as="image" href="iconos/agregar.png">
<link rel="preload" as="image" href="iconos/back.png">
<link rel="preload" as="image" href="iconos/impostor.png">
<link rel="preload" as="image" href="iconos/jugador.png">
<link rel="preload" as="image" href="iconos/jugadores-dorado.png">
<link rel="preload" as="image" href="iconos/jugadores.png">
<link rel="preload" as="image" href="iconos/modos-juego.png">
<link rel="preload" as="image" href="iconos/nueva-partida.png">
<link rel="preload" as="image" href="iconos/ojo.png">
<link rel="preload" as="image" href="iconos/quitar.png">
<link rel="preload" as="image" href="iconos/random.png">
<link rel="preload" as="image" href="iconos/impostor-blanco.png">
<link rel="preload" as="image" href="iconos/modo-clasico.png">
<link rel="preload" as="image" href="iconos/modo-pregunta.png">
<link rel="preload" as="image" href="iconos/modo-pregunta-libre.png">
<link rel="preload" as="image" href="iconos/libre.png">
  
<div id="app"></div>

<script>
let gameState = {};

const db = {
  "👤​ Personajes": ["David","Saúl","Moisés","Pedro"],
  "🏛️​ Lugares": ["Jerusalén","Belén","Egipto"],
  "📜 Objetos": ["Arca","Hondera","Tablas"],
  "⚡​ Eventos": ["Diluvio","Éxodo","Crucifixión"]
};

function render(html) {
  document.getElementById("app").innerHTML = `<div class="fade">${html}</div>`;
}

function backButton(action = "menu()") {
  return `
    <div style="margin-bottom:10px;">
      <button onclick="${action}" style="
        width:40px;
        height:40px;
        border-radius:12px;
        background:#1e1e1e;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:0;
      ">
        <img src="iconos/back.png" style="width:20px;">
      </button>
    </div>
  `;
}

// ---------- SPLASH ----------
function splash() {
  document.getElementById("app").style.padding = "0"; // 👈 clave

  render(`
    <div class="splash">
      <div class="logo-stamp">
        <img src="iconos/logo.png" class="logo-img">
      </div>
    </div>
  `);

  setTimeout(() => {
    document.getElementById("app").style.padding = "20px 16px"; // 👈 lo devolvés
    menu();
  }, 2000);
}

function header(showBack = false, backFn = "menu()") {
  return `
    <div style="
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      margin-bottom:20px;
    ">

      ${showBack ? `
        <button onclick="${backFn}" style="
          position:absolute;
          left:0;
          width:40px;
          height:40px;
          border-radius:12px;
          background:#1e1e1e;
          display:flex;
          align-items:center;
          justify-content:center;
          padding:0;
        ">
          <img src="iconos/back.png" style="width:20px;">
        </button>
      ` : ""}

      <img src="iconos/logo.png" style="
        width:70px;
        height:auto;
        filter: drop-shadow(0 6px 14px rgba(0,0,0,0.6));
      ">
    </div>
  `;
}
// ---------- MENU ----------
function menu() {
  render(`
    ${header()}
    <div class="card">
      <button onclick="setup()" style="display:flex; align-items:center; justify-content:center; gap:10px; font-size:20px;">
        <img src="iconos/nueva-partida.png" style="width:35px;">
        Nueva partida
      </button>

      <button onclick="modes()" style="display:flex; align-items:center; justify-content:center; gap:10px; font-size:20px;">
        <img src="iconos/modos-juego.png" style="width:30px;">
        Modos de juego
      </button>
    </div>
  `);
}

function modes() {
  render(`
    <h1>Modos de juego</h1>

    <div class="card" style="
      background: linear-gradient(145deg, #1a1a1a, #111);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    ">

      <!-- MODO 1 -->
      <div style="
        padding:18px;
        border-radius:14px;
        background:#1e1e1e;
        margin-bottom:14px;
        border:1px solid #2a2a2a;
      ">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
          <div style="
            width:50px; height:50px;
            border-radius:15px;
            background:white;
            display:flex; align-items:center; justify-content:center;
            font-size:20px;
          "><img src="iconos/modo-clasico.png" style="width:30px;"></div>

          <div>
            <div style="font-weight:bold; font-size:16px;">Clásico</div>
            <div style="font-size:12px; opacity:0.6;">El modo tradicional</div>
          </div>
        </div>

        <p style="margin:0; font-size:14px; opacity:0.75; line-height:1.4;">
          Cada jugador dice una palabra relacionada con el tema en su turno.
          Los impostores deben improvisar sin conocer la palabra real.
        </p>
      </div>

      <!-- MODO 2 -->
      <div style="
        padding:18px;
        border-radius:14px;
        background:#1e1e1e;
        margin-bottom:14px;
        border:1px solid #2a2a2a;
      ">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
          <div style="
            width:50px; height:50px;
            border-radius:15px;
            background:white;
            display:flex; align-items:center; justify-content:center;
            font-size:20px;
          "><img src="iconos/modo-pregunta.png" style="width:30px;"></div>

          <div>
            <div style="font-weight:bold; font-size:16px;">Pregunta en cadena</div>
            <div style="font-size:12px; opacity:0.6;">Más estratégico</div>
          </div>
        </div>

        <p style="margin:0; font-size:14px; opacity:0.75; line-height:1.4;">
          Cada jugador hace una pregunta al siguiente jugador.
          Las respuestas deben dar pistas sin revelar demasiado.
        </p>
      </div>

      <!-- MODO 3 -->
      <div style="
        padding:18px;
        border-radius:14px;
        background:#1e1e1e;
        border:1px solid #2a2a2a;
      ">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
          <div style="
            width:50px; height:50px;
            border-radius:15px;
            background:white;
            display:flex; align-items:center; justify-content:center;
            font-size:20px;
          "><img src="iconos/modo-pregunta-libre.png" style="width:30px;"></div>

          <div>
            <div style="font-weight:bold; font-size:16px;">Pregunta libre</div>
            <div style="font-size:12px; opacity:0.6;">Modo caótico</div>
          </div>
        </div>

        <p style="margin:0; font-size:14px; opacity:0.75; line-height:1.4;">
          Puedes hacer la pregunta a cualquier jugador.
          Ideal para presionar y descubrir impostores rápidamente.
        </p>
      </div>

      <button onclick="menu()" style="
        margin-top:20px;
        border-radius:16px;
        padding:18px;
        font-size:16px;
      ">
        ← Volver
      </button>

    </div>
  `);
}

// ---------- SETUP ----------
function setup() {
  render(`
    ${backButton("menu()")}
    ${header()}
    <div class="card">
      <h2>Nueva Partida</h2>

      <h4 style="display:flex; align-items:center; gap:8px;">
        <img src="iconos/jugadores-dorado.png" style="width:40px;">
        Cantidad de jugadores
      </h4>

      <div class="stepper">
        <button onclick="changePlayers(-1)">
          <img src="iconos/quitar.png" style="width:18px;">
        </button>

        <span id="players">3</span>

        <button onclick="changePlayers(1)">
          <img src="iconos/agregar.png" style="width:18px;">
        </button>
      </div>

      <p id="reco" class="center">(Mínimo 3 jugadores)</p>

      <h4 style="display:flex; align-items:center; gap:8px;">
        <img src="iconos/impostor.png" style="width:30px;">
        Cantidad de impostores
      </h4>

      <div class="stepper">
        <button onclick="changeImpostors(-1)">
          <img src="iconos/quitar.png" style="width:18px;">
        </button>

        <span id="impostors">1</span>

        <button onclick="changeImpostors(1)">
          <img src="iconos/agregar.png" style="width:18px;">
        </button>
      </div>

      <label class="switch-row">
        <div style="display:flex; flex-direction:column;">
          <span>Rol Discípulo</span>

          <!-- 👇 DESCRIPCIÓN -->
          <span style="
            font-size:12px;
            opacity:0.6;
            margin-top:2px;
          ">
            Un jugador tendrá el voto de desempate en caso de empate
          </span>
        </div>

        <label class="switch">
          <input id="enableDisciple" type="checkbox">
          <span class="slider"></span>
        </label>
      </label>

      <button onclick="names()">Continuar</button>
    </div>
  `);
}

// ---------- RECOMENDACIÓN ----------
function updateReco() {
  const n = +document.getElementById("players").value;
  const reco = document.getElementById("reco");

  if (!n || n < 3) {
    reco.textContent = "Ingresa al menos 3 jugadores";
    return;
  }

  let imp = n <= 6 ? 1 : n <= 9 ? 2 : 3;

  reco.textContent = `Recomendado para ${n} jugadores: ${imp} impostor${imp > 1 ? "es" : ""}`;
}

let autoImpostors = true;

function changePlayers(delta) {
  let el = document.getElementById("players");
  let value = parseInt(el.textContent);

  value += delta;

  if (value < 3) value = 3;
  if (value > 20) value = 20;

  el.textContent = value;

  if (autoImpostors) {
    let imp = value <= 5 ? 1 : value <= 9 ? 2 : 3;
    document.getElementById("impostors").textContent = imp;
  }
}

function changeImpostors(delta) {
  let el = document.getElementById("impostors");
  let players = parseInt(document.getElementById("players").textContent);
  let value = parseInt(el.textContent);

  value += delta;

  if (value < 1) value = 1;
  if (value >= players) value = players - 1;

  el.textContent = value;

  autoImpostors = false;
}

// ---------- NOMBRES ----------
function names() {
  const n = +document.getElementById("players").textContent;
  const imp = +document.getElementById("impostors").textContent;

  const discipleEnabled = document.getElementById("enableDisciple").checked;
  gameState.enableDisciple = discipleEnabled;

  if (!n || n < 3) return alert("Ingresa al menos 3 jugadores");
  if (!imp || imp < 1) return alert("Debe haber al menos 1 impostor");
  if (imp >= n) return alert("Debe haber menos impostores que jugadores");

  gameState.numImpostors = imp;

  let html = `
    ${backButton("setup()")}

    ${header()}
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
      <button onclick="setup()" style="
        width:40px;
        height:40px;
        border-radius:12px;
        background:#1e1e1e;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:0;
      ">
        <img src="iconos/back.png" style="width:20px;">
      </button>

      <h2 style="margin:0;">Nombres</h2>
    </div>

    <p style="text-align:center; opacity:0.6; margin-bottom:20px;">
      Ingresa el nombre de cada jugador
    </p>
  `;

  for (let i = 0; i < n; i++) {
    html += `
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">

        <div style="
          width:30px; /* Reducido de 36px */
          height:30px;
          border-radius:50%;
          background:#1e1e1e;
          display:flex;
          align-items:center;
          justify-content:center;
          color:var(--gold);
          font-weight:bold;
          font-size:14px;
        ">
          ${i + 1}
        </div>

        <div style="
          flex:1;
          display:flex;
          align-items:center;
          gap:10px;
          background:#1e1e1e;
          padding:8px 12px; /* Reducido de 14px */
          border-radius:10px;
        ">

          <img src="iconos/jugador.png" style="width:28px; opacity:0.6;"> <input 
            id="p${i}" 
            placeholder="Jugador ${i+1}"
            style="
              background:transparent;
              border:none;
              outline:none;
              color:white;
              width:100%;
              font-size:18px;
              height:30px; /* Altura controlada */
              padding:0;
              margin:0;
            "
          >
        </div>
      </div>
    `;
}
  html += `
    <!-- INFO BOX -->
    <div style="
      background:#141414;
      padding:14px;
      border-radius:14px;
      margin-top:20px;
      border-left:4px solid var(--gold);
      opacity:0.8;
      font-size:14px;
    ">
      Los nombres se usarán durante todo el juego.
      Asegúrate de que sean claros para todos.
    </div>

    <!-- BOTON GRANDE -->
    <button onclick="startGame(${n})" style="
      margin-top:30px;
      border-radius:20px;
      font-size:18px;
      padding:18px;
    ">
      Comenzar partida →
    </button>
  `;

  render(html);
}

// ---------- START ----------
function startGame(n) {
  let jugadores = [];

  for (let i = 0; i < n; i++) {
    let nombre = document.getElementById(`p${i}`).value.trim();
    if (!nombre) return alert("Completa todos los nombres");
    jugadores.push({ nombre, rol:"normal", activo:true });
  }

  const categorias = Object.keys(db);
  const categoria = categorias[Math.floor(Math.random()*categorias.length)];
  const palabra = db[categoria][Math.floor(Math.random()*db[categoria].length)];

  let impostores = [];
  let numImp = gameState.numImpostors || 1;

  while (impostores.length < numImp) {
    let r = Math.floor(Math.random()*n);
    if (!impostores.includes(r)) {
      jugadores[r].rol = "impostor";
      impostores.push(r);
    }
  }

  gameState = {
    ...gameState,
    jugadores,
    palabra,
    categoria,
    ronda:1,
    indexReveal:0
  };

  gameState.votes = [];
  gameState.voterIndex = 0;

  reveal();
}

// ---------- REVEAL ----------
function reveal() {
  let i = gameState.indexReveal;
  let j = gameState.jugadores[i];

  if (!j) {
    if (gameState.enableDisciple) {
      return pickDisciple();
    }
    return startRound();
  }

  const total = gameState.jugadores.length;

  render(`
    ${header()}
    <!-- 🔥 BARRA DE PROGRESO -->
    <div style="margin-bottom:10px;">
  
      <div style="
        text-align:center;
        font-size:14px;
        opacity:0.7;
        margin-bottom:10px;
      ">
        Jugador ${i+1} de ${total}
      </div>

      <div style="
        width:100%;
        height:6px;
        background:#222;
        border-radius:50px;
        overflow:hidden;
      ">
        <div style="
          width:${((i+1)/total)*100}%;
          height:100%;
          background:var(--gold);
          transition:width 0.3s ease;
        "></div>
      </div>

    </div>

    

    <div class="card" style="
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 150px; 
      text-align: center;
      gap: 4px; 
      padding: 10px;
    ">
      <div style="letter-spacing:3px; opacity:0.5; font-size:13px;">
        TURNO DE
      </div>

      <div style="
        font-size: 44px;
        font-weight: bold;
        color: var(--gold);
        animation: fade 0.5s ease forwards;
        text-shadow: 0 0 10px rgba(212,175,55,0.3);
      ">
        ${j.nombre}
      </div>

      <div style="opacity:0.5; font-size:13px; margin-top:2px;">
        Pasa el celular a esta persona
      </div>
    </div>

    <div id="revealBox" class="card" style="
      margin-top:20px;
      border:2px dashed var(--gold);
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
    " onclick="showWord()">

      <div style="margin-bottom: 10px;">
          <img src="iconos/ojo.png" style="width:80px;">
      </div>

      <h2 style="color:var(--gold); margin:10px 0;">
        Ver palabra
      </h2>

      <p style="opacity:0.7;">
        Toca para revelar tu rol
      </p>
    </div>
  `);
}

function showWord() {
  let j = gameState.jugadores[gameState.indexReveal];
  const box = document.getElementById("revealBox");

  let content = "";
  let warning = "";
  let topBanner = "";
  let companions = ""; // ✅ FIX CLAVE

  if (j.rol === "impostor") {

    const otrosImpostores = gameState.jugadores
      .filter(x => x.rol === "impostor" && x.nombre !== j.nombre)
      .map(x => x.nombre);

    // 👇 BLOQUE SEPARADO DEL COMPAÑERO
    if (otrosImpostores.length > 0) {
      companions = `
        <div class="card" style="
          margin-top:12px;
          border:2px solid var(--gold);
          text-align:center;
        ">
          <div style="opacity:0.7;">🤝 Tu compañero impostor es</div>
          <div style="margin-top:6px; font-weight:bold;">
            ${otrosImpostores.join(", ")}
          </div>
        </div>
      `;
    }

    topBanner = `
      <div id="impostorBanner" style="
        background: #4a0000; /* Un rojo más oscuro y elegante */
        color: white;
        padding: 10px;
        border-radius: 25px;
        text-align: center;
        font-weight: bold;
        margin: 20px 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        border: 1px solid #8b0000;
      ">
        <img src="iconos/impostor-blanco.png" style="width: 24px; height: auto;">
        
        <span style="letter-spacing: 1px;">ERES EL IMPOSTOR</span>
      </div>
    `;

    content = `
      <div style="
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
      ">

        <div style="
          letter-spacing:2px;
          opacity:0.6;
          margin-bottom:10px;
        ">
          CATEGORÍA
        </div>

        <div style="
          font-size:44px;
          margin-bottom:6px;
        ">
          ${gameState.categoria.split(" ")[0]}
        </div>

        <div style="
          font-size:18px;
          color:var(--gold);
        ">
          ${gameState.categoria.replace(/^[^ ]+ /, "")}
        </div>

      </div>
    `;

    warning = `
      <div style="
        width:100%;
        display:flex;
        justify-content:center;
        margin-top:12px;
      ">
        <p style="
          max-width:260px;
          text-align:center;
          font-style:italic;
          opacity:0.7;
          font-size:14px;
          line-height:1.4;
        ">
          No reveles que eres el impostor. Actúa como si conocieras la palabra.
        </p>
      </div>
    `;
  }

  else if (j.rol === "discipulo") {
    content = `
      <div style="letter-spacing:2px; opacity:0.7;">LA PALABRA ES</div>

      <div class="big-text" style="color:var(--gold); margin:10px 0;">
        ${gameState.palabra}
      </div>

      <div style="letter-spacing:4px; opacity:0.7;">Categoría</div>
      <div>${gameState.categoria}</div>

      <p style="margin-top:15px;"><b>Discípulo (voto de desempate)</b></p>
    `;
  }

  else {
    content = `
      <div style="letter-spacing:2px; opacity:0.7;">LA PALABRA ES</div>

      <div class="big-text" style="color:var(--gold); margin:10px 0;">
        ${gameState.palabra}
      </div>

      <div style="opacity:0.7;">Categoría</div>
      <div>${gameState.categoria}</div>
    `;
  }

  // 👇 Banner arriba
  if (topBanner && !document.getElementById("impostorBanner")) {
    box.insertAdjacentHTML("beforebegin", topBanner);
  }

  // 👇 Contenido carta
  box.innerHTML = content;

  box.style.border = j.rol === "impostor"
    ? "2px solid #8b0000"
    : "2px solid var(--gold)";

  box.style.cursor = "default";
  box.onclick = null;

  // 👇 Todo lo de abajo (FIX botón + companions)
  box.insertAdjacentHTML("afterend", `
    ${companions}
    ${warning}

    <button onclick="nextReveal()" style="margin-top:20px;">
      Continuar →
    </button>
  `);
}

function nextReveal() {
  gameState.indexReveal++;
  
  if (gameState.indexReveal >= gameState.jugadores.length) {
    // Al terminar de revelar, vamos directo a la pantalla de la ronda
    return startRound(); 
  }
  
  reveal();
}

function showDisciple() {
  let d = gameState.disciple;

  render(`
    ${header()}

    <div class="card" style="text-align:center;">
      <h2 style="color:var(--gold);">Discípulo</h2>

      <div style="font-size:52px; margin:20px 0;">
        ${d.nombre}
      </div>

      <p style="opacity:0.7;">
        Este jugador tiene voto de desempate en caso de empate
      </p>

      <button onclick="startRound()">
        Continuar
      </button>
    </div>
  `);
}

function pickDisciple() {
  let candidatos = gameState.jugadores
    .filter(j => j.activo); // solo vivos

  let elegido = candidatos[Math.floor(Math.random() * candidatos.length)];

  elegido.rol = "discipulo";

  gameState.disciple = elegido;

  render(`
    ${header()}

    <div class="card" style="text-align:center;">
      <h2>ROL DISCÍPULO</h2>

      <p style="opacity:0.7;">
        Este jugador tendrá voto de desempate en caso de empate en las votaciones
      </p>

      <button onclick="showDisciple()">
        Revelar
      </button>
    </div>
  `);
}

// ---------- RONDA ----------
function startRound() {
  let activos = gameState.jugadores.filter(j => j.activo);
  // Barajamos el orden para que cada ronda sea distinta
  let ordenTurno = [...activos].sort(() => Math.random() - 0.5);

  render(`
    <div style="text-align:center; margin-bottom:20px;">
      <span style="background:#1e1e1e; padding:6px 16px; border-radius:20px; color:var(--gold); font-size:14px; font-weight:bold;">
        Ronda ${gameState.ronda}
      </span>
    </div>

    <div style="text-align:center; margin-bottom:24px;">
       <img src="iconos/random.png" style="width:50px;">
       <h1 style="margin:10px 0 5px 0; color:white; font-size:28px;">Orden de participación</h1>
       <p style="opacity:0.5; font-size:14px; margin:0; padding: 0 40px; line-height:1.4;">
         Los jugadores dirán una palabra relacionada en este orden
       </p>
    </div>

    <div class="card" style="padding:8px; background:#111; border: 1px solid #1a1a1a;">
      ${ordenTurno.map((j, idx) => `
        <div style="display:flex; align-items:center; gap:15px; padding:14px 12px; ${idx !== ordenTurno.length - 1 ? 'border-bottom:1px solid #1a1a1a;' : ''}">
          <div style="width:34px; height:34px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; font-size:16px; flex-shrink:0;">
            ${idx + 1}
          </div>
          <img src="iconos/jugador.png" style="width:30px; opacity:0.8;">
          <span style="font-size:19px; font-weight:500; color:#eee;">${j.nombre}</span>
        </div>
      `).join("")}
    </div>

    <div class="card" style="background:#141414; border:none; box-shadow:none; padding: 15px 15px 15px 15px;">
      <div style="display:flex; gap:12px; margin-bottom:16px; align-items:flex-start;">
        <div style="color:var(--gold); border:1px solid var(--gold); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; margin-top:2px;">✓</div>
        <p style="margin:0; font-size:14px; opacity:0.7;">Cada jugador dice una palabra relacionada con el tema</p>
      </div>
      <div style="display:flex; gap:12px; margin-bottom:16px; align-items:flex-start;">
        <div style="color:#ffcc00; border:1px solid #ffcc00; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; margin-top:2px;">!</div>
        <p style="margin:0; font-size:14px; opacity:0.7;">Los impostores no saben la palabra exacta</p>
      </div>
      <div style="display:flex; gap:12px; align-items:flex-start;">
        <div style="color:var(--gold); border:1px solid var(--gold); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; margin-top:2px;">✓</div>
        <p style="margin:0; font-size:14px; opacity:0.7;">Al final, votan para eliminar a un sospechoso</p>
      </div>
    </div>

    <button onclick="vote()" style="margin-top:10px; border-radius:18px; padding:22px; font-size:18px;">
      Ir a votación →
    </button>
  `);
}
// ---------- VOTACIÓN ----------
function getVoteCount() {
  return gameState.jugadores.filter(j => j.activo && j.rol === "impostor").length || 1;
}

function vote() {
  let activos = gameState.jugadores.filter(j => j.activo);
  let voter = activos[gameState.voterIndex];

  const N = getVoteCount();
  let selected = [];

  render(`
    ${header()}

    <div class="card">
      <h2>Votación</h2>

      <p style="text-align:center; opacity:0.7;">
        Turno de <b>${voter.nombre}</b>
      </p>

      <p style="text-align:center; font-size:14px;">
        Selecciona ${N} jugador${N > 1 ? "es" : ""}
      </p>

      ${activos.map(j => j.nombre !== voter.nombre ? `
        <div class="wa-player" onclick="toggleVote('${j.nombre}', this)">
          <span>${j.nombre}</span>

          <div class="wa-switch">
            <div class="wa-knob"></div>
          </div>
        </div>
      ` : "").join("")}

      <button onclick="confirmVote()">
        Confirmar voto
      </button>
    </div>
  `);

  gameState.tempSelected = [];
}

function resolveVote() {
  let conteo = {};

  gameState.votes.forEach(v => {
    conteo[v] = (conteo[v] || 0) + 1;
  });

  // guardamos conteo para mostrarlo
  gameState.lastVoteCount = conteo;

  // pasamos a pantalla de resultados (SIN eliminar aún)
  showVoteResults();
}

function showVoteResults() {
  let conteo = gameState.lastVoteCount || {};

  let lista = Object.entries(conteo)
    .sort((a,b) => b[1] - a[1]);

  render(`
    ${header()}

    <div class="card">
      <h2>Resultado de votación</h2>

      ${lista.map(([nombre, votos]) => `
        <div class="player" style="justify-content:space-between;">
          <span>${nombre}</span>
          <b>${votos} voto${votos !== 1 ? "s" : ""}</b>
        </div>
      `).join("")}

      <button onclick="selectElimination()">
        Seleccionar eliminados
      </button>
    </div>
  `);
}

function selectElimination() {
  let activos = gameState.jugadores.filter(j => j.activo);
  let N = gameState.jugadores.filter(j => j.activo && j.rol === "impostor").length || 1;

  gameState.toEliminate = [];

  render(`
    ${header()}

    <div class="card">
      <h2>Selecciona ${N} jugador${N > 1 ? "es" : ""} a eliminar</h2>

      ${activos.map(j => `
        <div class="wa-player" onclick="toggleEliminate('${j.nombre}', this)">
          <span>${j.nombre}</span>

          <div class="wa-switch">
            <div class="wa-knob"></div>
          </div>
        </div>
      `).join("")}

      <button onclick="confirmElimination()">
        Confirmar eliminación
      </button>
    </div>
  `);
}

function toggleEliminate(name, el) {
  let N = gameState.jugadores.filter(j => j.activo && j.rol === "impostor").length || 1;

  let index = gameState.toEliminate.indexOf(name);

  if (index >= 0) {
    gameState.toEliminate.splice(index, 1);
    el.classList.remove("selected");
  } else {
    if (gameState.toEliminate.length >= N) return;
    gameState.toEliminate.push(name);
    el.classList.add("selected");
  }
}

function confirmElimination() {
  let eliminados = gameState.toEliminate;

  if (!eliminados || eliminados.length === 0) {
    return alert("Selecciona jugadores");
  }

  // eliminar jugadores
  eliminados.forEach(nombre => {
    let j = gameState.jugadores.find(x => x.nombre === nombre);
    if (j) j.activo = false;
  });

  // mostrar resultado con roles
  render(`
    <h1>Resultados</h1>

    <div class="card">
      <h2>Jugadores eliminados</h2>

      ${eliminados.map(nombre => {
        let j = gameState.jugadores.find(x => x.nombre === nombre);

        return `
          <div class="player" style="
            justify-content:space-between;
            background:${j.rol === "impostor" ? "#2a0000" : "#1a1a1a"};
          ">
            <span>${nombre}</span>
            <b>${j.rol.toUpperCase()}</b>
          </div>
        `;
      }).join("")}

      <button onclick="endElimination()">
        Continuar
      </button>
    </div>
  `);
}

function endElimination() {
  gameState.votes = [];
  gameState.voterIndex = 0;
  gameState.lastVoteCount = null;
  gameState.toEliminate = [];

  checkWin();
}

function eliminatePlayers() {
  let conteo = gameState.lastVoteCount || {};

  let ordenados = Object.entries(conteo)
    .sort((a,b) => b[1] - a[1])
    .map(x => x[0]);

  let N = gameState.jugadores.filter(j => j.activo && j.rol === "impostor").length || 1;

  let eliminados = ordenados.slice(0, N);

  eliminados.forEach(nombre => {
    let j = gameState.jugadores.find(x => x.nombre === nombre);
    if (j) j.activo = false;
  });

  gameState.votes = [];
  gameState.voterIndex = 0;
  gameState.lastVoteCount = null;

  checkWin();
}

function toggleVote(name, el) {
  let N = gameState.jugadores.filter(j => j.activo && j.rol === "impostor").length || 1;

  let index = gameState.tempSelected.indexOf(name);

  if (index >= 0) {
    gameState.tempSelected.splice(index, 1);
    el.classList.remove("selected");
  } else {
    if (gameState.tempSelected.length >= N) return;
    gameState.tempSelected.push(name);
    el.classList.add("selected");
  }
}

function confirmVote() {
  let activos = gameState.jugadores.filter(j => j.activo);
  let voter = activos[gameState.voterIndex];

  const N = getVoteCount();

  if (gameState.tempSelected.length !== N) {
    const N = getVoteCount();
    return alert(`Debes seleccionar ${N} jugadores`);
  }

  gameState.tempSelected.forEach(name => {
    gameState.votes.push(name);
  });

  gameState.voterIndex++;

  if (gameState.voterIndex >= activos.length) {
    return resolveVote();
  }

  vote();
}

// ---------- FIN ----------
function checkWin() {
  let activos = gameState.jugadores.filter(j=>j.activo);
  let impostores = activos.filter(j=>j.rol==="impostor");
  let normales = activos.filter(j=>j.rol!=="impostor");

  if (impostores.length === 0) {
    render(`<div class="card"><h2>GANAN LOS INOCENTES</h2><button onclick="menu()">Inicio</button></div>`);
    return;
  }

  if (normales.length === 1) {
    render(`<div class="card"><h2>GANAN LOS IMPOSTORES</h2><button onclick="menu()">Inicio</button></div>`);
    return;
  }

  nextRound();
}

function nextRound() {
  gameState.ronda++;
  startRound();
}

// INIT
splash();
</script>

</body>
</html>
